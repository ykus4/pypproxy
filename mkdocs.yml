site_name: pypproxy
site_description: MITM HTTP/HTTPS proxy for inspecting, modifying, and testing traffic
site_url: https://ykus4.github.io/pypproxy/
repo_url: https://github.com/ykus4/pypproxy
repo_name: ykus4/pypproxy
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - UI:
      - Web UI & CUI: web-ui.md
  - Features:
      - Rule Engine: rule-engine.md
      - Python Scripting: scripting.md
      - Replay & Fuzzing: replay.md
      - gRPC & WebSocket: protocols.md
  - Reference:
      - Configuration: configuration.md
      - API Reference: api.md
      - Architecture: architecture.md
